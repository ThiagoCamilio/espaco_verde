<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<div class="banner">
  <div class="banner-content">
    <h2>Bem-vindo de volta!</h2>
  </div>
</div>

<div class="form-container" id="form-container">
  <div class="form-header">
    <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
    <p>Informe suas credenciais para acessar sua conta</p>
  </div>
  <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">
        <i class="fas fa-envelope"></i> E-mail *
      </label>
      <input
        type="email"
        id="email"
        name="email"
        [(ngModel)]="user.login"
        placeholder="Digite seu e-mail">
    </div>
    <div class="form-group">
      <label for="senha">
        <i class="fas fa-lock"></i> Senha *
      </label>
      <div style="position: relative;">
        <input
          type="password"
          id="senha"
          name="senha"
          [(ngModel)]="user.password"
          placeholder="Digite sua senha">
      </div>
    </div>
    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
      <label style="display: flex; align-items: center; cursor: pointer;">
        <input type="checkbox" style="width: auto; margin-right: 8px;">
        <span>Lembrar-me</span>
      </label>
      <a href="#" class="forgot-password">Esqueci minha senha?</a>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-submit">
        <i class="fas fa-sign-in-alt"></i> Entrar
      </button>
      <button type="button" class="btn-reset">
        <i class="fas fa-undo-alt"></i> Limpar
      </button>
    </div>

    <div class="register-link" style="text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #eee;">
      <p>Não tem uma conta? <a href="#" style="color: var(--verde-principal); text-decoration: none; font-weight: 600;">Cadastre-se aqui</a></p>
    </div>
  </form>
</div>
