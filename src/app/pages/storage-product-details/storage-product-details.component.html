<div class="container-details" *ngIf="product">

    <div class="top-section">
        <div class="image-wrapper">
            <img *ngIf="!imagePreview" [src]="baseImageUrl + product.imagem" [alt]="product.nome" class="image">

            <div *ngIf="editToggle" class="upload-btn">
                <img *ngIf="imagePreview" [src]="imagePreview" alt="Preview da imagem" class="image">
                <label for="file-input" class="custom-file-input">
                    <i class="fa-solid fa-camera"></i> Alterar imagem
                </label>
                <input type="file" (change)="onFileSelected($event)" accept="image/*" id="file-input">
            </div>
        </div>
    </div>

    <div class="action-btns">
        <button *ngIf="editToggle" class="btn-save" (click)="saveEdit()"><i class="fa-solid fa-check"></i>
            Salvar</button>
        <button *ngIf="editToggle" class="btn-cancel" (click)="onEditToggle()"><i class="fa-solid fa-x"></i>
            Cancelar</button>
        <button *ngIf="!editToggle" class="btn-edit" (click)="onEditToggle()"><i class="fa-solid fa-pen-to-square"></i>
            Editar</button>
        <button *ngIf="!editToggle" class="btn-delete" (click)="onModalToggle()"><i class="fa-solid fa-trash-can"></i>
            Excluir</button>
    </div>

    <div *ngIf="modalToggle" class="modal">
        <app-delete-modal [product]="product" (closeModal)="modalToggle = false"></app-delete-modal>
    </div>

    <div class="product-info-section">

        <div class="product-header">
            <h1 *ngIf="!editToggle" class="name">{{product.nome}}</h1>
            <input *ngIf="editToggle" [(ngModel)]="editedProduct.nome" class="input-product-name" placeholder="Nome">

            <div class="product-quantity">
                <strong *ngIf="!editToggle">{{product.stockQuantity}} UNIDADES EM ESTOQUE</strong>
                <strong *ngIf="!editToggle" class="reserved-quantity">{{product.reservedQuantity}} UNIDADES
                    RESERVADAS</strong>

            </div>
        </div>

        <span *ngIf="!editToggle" class="product-type">{{product.tipo}}</span>
        <input *ngIf="editToggle" [(ngModel)]="editedProduct.tipo" class="input-product-type" placeholder="Tipo">

        <span *ngIf="!editToggle" class="price">{{product.preco | currency:'BRL'}}</span>
        <div *ngIf="editToggle" class="edit-price-wrapper">
            R$<input type="number" [(ngModel)]="editedProduct.preco" class="input-product-price" placeholder="Preço">
        </div>

        <div class="pricing-container">

            <div class="cost-price">
                <label>Preço de custo</label>
                <span class="value">{{ product.precoCusto | currency:'BRL' }}</span>
            </div>
            <div class="suggested-price" [class.active]="product.useSuggestedPrice">
                <label>Sugerido</label>
                <span class="value">{{ product.suggestedPrice | currency:'BRL' }}</span>
            </div>

            <hr class="card-divider">

            <div class="pricing-controls">
                <div class="control-group">
                    <label>Categoria de Precificação</label>
                    <select class="ev-input ev-input-sm" [ngModel]="product.pricingCategory?.id"
                        (ngModelChange)="onCategoryChange($event)">
                        <option [ngValue]="null" disabled>Selecione uma estratégia</option>
                        <option *ngFor="let category of pricingCategories" [value]="category.id">
                            {{ category.name }}
                        </option>
                    </select>
                </div>

                <div class="control-group toggle-group">
                    <label>Precificar</label>
                    <label class="switch">
                        <input type="checkbox" [(ngModel)]="product.useSuggestedPrice" (change)="onToggleSync()"
                            [disabled]="!product.suggestedPrice || product.suggestedPrice <= 0 ">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </div>

        <hr class="divider">

        <div class="desc-section">
            <h3>Descrição</h3>
            <p *ngIf="!editToggle">{{product.descricao}}</p>
            <textarea *ngIf="editToggle" [(ngModel)]="editedProduct.descricao" class="input-product-desc"
                placeholder="Descrição"></textarea>
        </div>
    </div>
</div>
