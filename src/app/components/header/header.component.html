<!-- header.component.html -->
<header class="header">
  <div class="container">
    <div class="logo">
      <a routerLink="/">
        <img src="assets/logo.png" alt="Espaço Verde">
        <span>Espaço Verde</span>
      </a>
    </div>

    <nav class="nav">
      <ul>
        <li><a routerLink="/" routerLinkActive="active">Home</a></li>
        <li><a routerLink="/products" routerLinkActive="active">Produtos</a></li>
        <li><a routerLink="/about" routerLinkActive="active">Sobre</a></li>
        <li><a routerLink="/contact" routerLinkActive="active">Contato</a></li>
      </ul>
    </nav>

    <div class="header-actions">
      <button class="search-btn">
        <i class="fas fa-search"></i>
      </button>

      <button class="cart-btn" (click)="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" *ngIf="cartItemCount > 0">
          {{ cartItemCount }}
        </span>
      </button>
    </div>
  </div>
</header>
