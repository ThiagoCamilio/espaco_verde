<header>
  <div class="header-container">
    <div routerLink="/"  class="logo">
      <i class="fas fa-leaf"></i>
      <h1>Espaço Verde</h1>
    </div>

    <nav>
      <ul>
        <li><a routerLink="/home">Início</a></li>
      </ul>
    </nav>

    <div class="header-actions">
      <div class="user-area">
        <ng-container *ngIf="(isLoggedIn$ | async) === false">
          <button routerLink="/login" class="login-btn">Entrar</button>
          <button routerLink="/register" class="register-btn">Cadastre-se</button>
        </ng-container>

        <ng-container *ngIf="isLoggedIn$ | async">

          <div class="cart-container"  *ngIf="userRole != 'admin'" routerLink="/user/cart", title="Ver meu carrinho de compras">
              <i class="fa-solid fa-cart-shopping icon-cart"></i>
            <span class="cart-badge" *ngIf="(totalItens$ | async) as total">
              {{ total }}
            </span>
          </div>
          <button class="profile-btn" *ngIf="userRole != 'admin'" routerLink="/user/profile" >Meu Perfil</button>
          <button class="profile-btn" *ngIf="userRole == 'admin'" routerLink="/admin" >Dashboard</button>
          <button (click)="logout()" class="logout-btn">Sair</button>
        </ng-container>
      </div>
    </div>
  </div>
</header>
