<app-base-product-card
    [product]="product"
    [route]="'product/'+product.id!"
>  
    <div class="storage-info">
        <strong> Qnt: {{product.stockQuantity}}</strong>
    </div>
    <div class="action-btns">
        <button class="btn-edit" [routerLink]="['product/'+product.id]" [queryParams]="{edit :true}"><i class="fa-solid fa-pen-to-square"></i> Editar</button>
        <button class="btn-delete" (click)="onModalClick($event)"><i class="fa-solid fa-trash-can"></i> Excluir</button>
    </div>
</app-base-product-card>
