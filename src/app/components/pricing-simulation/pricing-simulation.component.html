<div class="ev-card simulation-card">
  
  <div class="simulation-header">
    <div class="method-selector">
      <label>Método de Precificação</label>
      <select class="ev-input" [(ngModel)]="selectedMethod">
        <option *ngFor="let m of methods" [value]="m.value">{{ m.label }}</option>
      </select>
    </div>
    
    <button class="ev-btn-primary" (click)="onApply()">
      <span class="btn-icon">⚡</span> Aplicar Método
    </button>
  </div>

  <hr class="divider">
